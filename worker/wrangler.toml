name = "boxd-card"
main = "index.ts"
compatibility_date = "2024-09-23"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# To deploy:
#   npx wrangler deploy
#
# Secrets (set once per environment):
#   npx wrangler secret put TMDB_API_KEY
#     Required by the /tmdb route. Without it, /tmdb returns 503. The value
#     is a TMDB v4 "API Read Access Token" (Bearer token), NOT the v3 API Key.
#     Sent as `Authorization: Bearer <token>` so the key never appears in URLs.
#
# To run locally (for dev:web):
#   npx wrangler dev --port 8787
#     For local TMDB dev, add TMDB_API_KEY=... to .dev.vars (gitignored).
#
# After deploying, set the worker URL in .env.local:
#   VITE_PROXY_URL=https://boxd-card-proxy.<account>.workers.dev
#
# Or add a custom domain via the Cloudflare dashboard and use that instead,
# e.g. VITE_PROXY_URL=https://proxy.boxd-card.michaellamb.dev
