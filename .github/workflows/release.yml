name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    # Skip if this push was itself a release tag-push (safety guard)
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build extension
        run: npm run build

      - name: Package dist as zip
        run: |
          cd dist
          zip -r ../boxd-card-${{ steps.version.outputs.version }}.zip .

      - name: Tag release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG"; then
            echo "Tag $TAG already exists on remote — skipping tag creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ZIP="boxd-card-${{ steps.version.outputs.version }}.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading zip asset (overwrite if present)."
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" \
              --title "$TAG" \
              --generate-notes \
              --target release
          fi
