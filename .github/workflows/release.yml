name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    name: Version, Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Determine version bump from PR label
        id: semver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Resolve the semver bump level from the label on the PR that introduced
          # this commit. Uses the commits API rather than searching merged PRs —
          # more reliable since it doesn't depend on merge-commit SHA matching.
          SHA="${{ github.sha }}"
          LABEL=$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
            --jq '.[0].labels[].name' \
            | grep -E '^(major|minor|patch)$' \
            | head -1)

          if [ -z "$LABEL" ]; then
            echo "No major/minor/patch label found — defaulting to patch"
            LABEL="patch"
          fi

          echo "bump=$LABEL" >> "$GITHUB_OUTPUT"
          echo "Bump level: $LABEL"

      - name: Bump version
        id: version
        run: |
          BUMP="${{ steps.semver.outputs.bump }}"
          CURRENT=$(node -p "require('./package.json').version")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW_VERSION"

          # Update package.json
          npm version "$NEW_VERSION" --no-git-tag-version

          # Update manifest.json
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            m.version = '$NEW_VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          "

      - name: Build extension
        run: npm run build

      - name: Package dist as zip
        run: |
          cd dist
          zip -r ../boxd-card-${{ steps.version.outputs.new_version }}.zip .
          cd ..

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json manifest.json
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin release --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new_version }}" \
            boxd-card-${{ steps.version.outputs.new_version }}.zip \
            --title "v${{ steps.version.outputs.new_version }}" \
            --generate-notes \
            --target release
