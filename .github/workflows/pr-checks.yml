name: PR Checks

on:
  pull_request:
    branches:
      - release

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version is not already tagged
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git tag | grep -qx "v$VERSION"; then
            echo "ERROR: Tag v$VERSION already exists. Bump the version in package.json and manifest.json before opening a release PR."
            exit 1
          fi
          echo "Version v$VERSION is clear to release."

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build extension
        run: npm run build
