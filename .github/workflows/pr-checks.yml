name: PR Checks

on:
  pull_request:
    branches:
      - release

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version is not already tagged
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if ! git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG does not exist yet — clear to release."
            exit 0
          fi
          # Tag exists. Allow this PR if the tagged commit is reachable from
          # HEAD — that means we're only syncing the release branch up to a
          # commit that was already released, not trying to ship new content
          # under an already-released version.
          if git merge-base --is-ancestor "$TAG" HEAD; then
            echo "Tag $TAG already exists and is reachable from HEAD — syncing only, no new version required."
            exit 0
          fi
          echo "ERROR: Tag $TAG exists but points outside the current history. Bump the version in package.json and manifest.json before opening a release PR."
          exit 1

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build extension
        run: npm run build
